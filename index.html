<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bigger Coin Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #66fcf1;
            --bg: #0b0c10;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-secondary: #c5c6c7;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .game-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            position: relative;
            padding-bottom: 80px;
        }

        .header {
            text-align: center;
            padding: 15px 10px 5px 10px;
        }

        h1 {
            font-size: 22px;
            margin: 0 0 5px 0;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.2);
        }

        .balance-box {
            font-size: 42px;
            font-weight: bold;
            color: #ffffff;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .screen {
            display: none;
            padding: 15px;
            overflow-y: auto;
            height: calc(100vh - 180px);
            width: 100%;
            box-sizing: border-box;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Coin Tap Elements */
        .coin-wrapper {
            margin: auto 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .coin-btn {
            background: none;
            border: none;
            outline: none;
            cursor: pointer;
            transition: transform 0.05s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .coin-btn:active {
            transform: scale(0.94);
        }

        .coin-design {
            width: 210px;
            height: 210px;
            background: radial-gradient(circle, #f7b924 0%, #d4af37 60%, #aa7c11 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 85px;
            box-shadow: 0 0 40px rgba(247, 185, 36, 0.35), inset 0 0 20px rgba(255, 255, 255, 0.5);
            border: 6px solid #fff;
        }

        /* Energy Elements */
        .energy-box {
            width: 100%;
            margin-top: auto;
            padding: 10px 0;
        }

        .energy-text {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .energy-bar-bg {
            width: 100%;
            height: 12px;
            background: #222;
            border-radius: 6px;
            overflow: hidden;
        }

        .energy-bar-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #66fcf1, #45a29e);
            transition: width 0.1s linear;
        }

        /* Lists and Cards */
        .list-container {
            width: 100%;
        }

            background: var(--card-bg);
            border: 1px solid rgba(255, 255
